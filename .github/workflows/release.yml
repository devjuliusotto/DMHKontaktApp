name: Release Windows App

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version, for example 0.0.2"
        required: true
  push:
    tags:
      - "v*"
      - "app-v*"

jobs:
  release-windows:
    permissions:
      contents: write

    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && format('app-v{0}', inputs.version) || github.ref_name }}
          releaseName: ${{ github.event_name == 'workflow_dispatch' && format('AgendaKontakte v{0}', inputs.version) || format('AgendaKontakte {0}', github.ref_name) }}
          releaseBody: "Windows installer for AgendaKontakte."
          releaseDraft: true
          prerelease: false
